name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  # Required for build-provenance artifact attestations.
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: |
          npm run typecheck
          npm test

      - name: Build plugin
        run: npm run build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            main.js
            styles.css

      - name: Extract release notes
        id: notes
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          # Pull the section for this version out of CHANGELOG.md if present;
          # otherwise leave empty so gh falls back to generated notes.
          notes="$(awk -v ver="$tag" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md)"
          {
            echo "body<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_BODY: ${{ steps.notes.outputs.body }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if [ -n "$(printf '%s' "$RELEASE_BODY" | tr -d '[:space:]')" ]; then
            printf '%s\n' "$RELEASE_BODY" > release-notes.md
            gh release create "$tag" \
              --title="$tag" \
              --draft \
              --notes-file release-notes.md \
              main.js manifest.json styles.css
          else
            gh release create "$tag" \
              --title="$tag" \
              --draft \
              --generate-notes \
              main.js manifest.json styles.css
          fi
